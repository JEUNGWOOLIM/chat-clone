<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
  </head>
  <body>
    <header>
      <div class="header">
        <div class="header-bar">
          <div class="header-bar__img">
            <img src="assets/arrow-left.svg" alt="" />
          </div>
          <div class="header-bar__name">
            <div class="header-bar__name-id">
              <div>슬기맘</div>
              <div id="header-bar__tem">36.5℃</div>
            </div>
            <div class="header-bar__time">
              <div>보통 1시간 이내 응답</div>
            </div>
          </div>
        </div>
        <div class="header-bar__icons">
          <div class="header-bar__icons-pone">
            <img src="assets/pone.svg" alt="" />
          </div>
          <div class="header-bar__icons-dot">
            <img src="assets/dot3.svg" alt="" />
          </div>
        </div>
      </div>
      <div class="header-info">
        <div class="header-info__img">
          <img src="assets/sell.PNG" alt="" />
        </div>
        <div class="header-info__list">
          <div class="header-info__list-info">유모차 팔아요</div>
          <div class="header-info__list-price">50,000원</div>
        </div>
      </div>
    </header>

    <main>
      <div class="main-mychat">
        <div class="main-mychat__time">오후3:45</div>
        <div class="main-mychat__chating">
          오늘 시민공원 근처에서 7시에 가능하<br />신가요?
        </div>
      </div>
      <div class="main-yourchat">
        <div class="main-yourchat__user">
          <img src="assets/user.svg" alt="" />
        </div>
        <div class="main-yourchat__chating">네 가능해요 그때 봐요!</div>
        <div class="main-yourchat__time">오후3:45</div>
      </div>
      <div class="main-alert">
        <div class="main-alert__icon">
          <img src="assets/calendal.svg" alt="" />
        </div>
        <div class="main-alert__info">
          <div class="main-alert__info-time">4월 28일 (수) 오후 7:00</div>
          <div class="main-alert__info-what">
            슬기맘님이 거래 약속을 설정했어요.
          </div>
        </div>
      </div>
      <div class="main-call">
        약속 시간30분 전에 슬기맘님에게 알림이 울릴 거에요!
      </div>
    </main>

    <footer>
      <div class="footer-plus">
        <img src="assets/plus.svg" alt="" />
      </div>
      <div class="footer-input">
        <div class="footer-input__text">
          <input type="text" placeholder="메세지를 입력하세요!" required />
        </div>
        <div class="footer-input__icon">
          <img src="assets/smile.svg" alt="" />
        </div>
      </div>
      <button class="footer-submit">
        <img src="assets/paper-airplane.svg" alt="" />
      </button>
    </footer>
  </body>
</html>
